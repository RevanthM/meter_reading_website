name: Create Elastic Beanstalk environment

# Create a new env (e.g. amrportal-prod) on a supported Node.js platform.
# Clones env vars + IAM from an existing environment; does not copy deprecated stacks.
on:
  workflow_dispatch:
    inputs:
      new_env_name:
        description: "New environment name (terminate same name in EB first if recreating)"
        required: true
        default: amrportal-prod
      template_env:
        description: "Clone env vars + IAM from this environment"
        required: true
        default: amrportal
        type: choice
        options:
          - meter-reading-dev
          - amrportal
          - amrportal-prod
          - meter-reading-prod
      platform_branch:
        description: "Platform branch (supported — not deprecated Node 20)"
        required: true
        default: nodejs22
        type: choice
        options:
          - nodejs24
          - nodejs22
      tier_type:
        description: "WebServer tier — Standard = single instance (no ALB)"
        required: true
        default: standard
        type: choice
        options:
          - standard
          - loadbalanced

permissions:
  contents: read

env:
  AWS_REGION: us-west-2
  EB_APPLICATION: meter-reading-app

jobs:
  create:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if environment already exists
        id: exists
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          read -r NAME STATUS <<< "$(aws elasticbeanstalk describe-environments \
            --region "${AWS_REGION}" \
            --environment-names "${{ inputs.new_env_name }}" \
            --query "Environments[0].[EnvironmentName,Status]" \
            --output text 2>/dev/null || echo "None None")"
          if [ "$NAME" = "${{ inputs.new_env_name }}" ] && [ "$STATUS" != "Terminated" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            aws elasticbeanstalk describe-environments \
              --region "${AWS_REGION}" \
              --environment-names "${{ inputs.new_env_name }}" \
              --query "Environments[0].[Status,Health,SolutionStackName,CNAME]" \
              --output table
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            if [ "$STATUS" = "Terminated" ]; then
              echo "Previous env was Terminated — creating a new one with the same name."
            fi
          fi

      - name: Resolve platform stack
        if: steps.exists.outputs.exists != 'true'
        id: platform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          case "${{ inputs.platform_branch }}" in
            nodejs24) NODE_MAJOR=24 ;;
            nodejs22) NODE_MAJOR=22 ;;
            *) echo "Unknown platform_branch" >&2; exit 1 ;;
          esac
          chmod +x scripts/eb-resolve-platform.sh
          STACK=$(scripts/eb-resolve-platform.sh "${NODE_MAJOR}" "${AWS_REGION}")
          echo "stack=${STACK}" >> "$GITHUB_OUTPUT"
          echo "node_major=${NODE_MAJOR}" >> "$GITHUB_OUTPUT"
          echo "Using platform: ${STACK}"

      - name: Build option settings from template
        if: steps.exists.outputs.exists != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          aws elasticbeanstalk describe-configuration-settings \
            --region "${AWS_REGION}" \
            --application-name "${EB_APPLICATION}" \
            --environment-name "${{ inputs.template_env }}" \
            --output json > /tmp/config.json

          # App env vars only (avoid VPC/SG clone issues).
          jq '
            .ConfigurationSettings[0].OptionSettings
            | map(select(
                .ResourceName == null
                and .Namespace == "aws:elasticbeanstalk:application:environment"
                and (.Value != null)
                and (.Value | type == "string")
              ))
            | map({Namespace, OptionName, Value})
          ' /tmp/config.json > /tmp/option-settings.json

          # Instance profile is required; copy from template (any namespace/option name).
          PROFILE=$(jq -r '
            .ConfigurationSettings[0].OptionSettings
            | map(select(.OptionName | test("IamInstanceProfile|InstanceProfile"; "i")))
            | map(select(.Value != null and (.Value | type == "string") and (.Value | length > 0)))
            | .[0].Value // empty
          ' /tmp/config.json)

          if [ -z "$PROFILE" ] || [ "$PROFILE" = "null" ]; then
            echo "No IamInstanceProfile in template config — reading from running instance…" >&2
            INSTANCE_ID=$(aws elasticbeanstalk describe-environment-resources \
              --region "${AWS_REGION}" \
              --environment-name "${{ inputs.template_env }}" \
              --query "EnvironmentResources.Instances[0].Id" \
              --output text 2>/dev/null || echo "")
            if [ -n "$INSTANCE_ID" ] && [ "$INSTANCE_ID" != "None" ]; then
              PROFILE=$(aws ec2 describe-instances \
                --region "${AWS_REGION}" \
                --instance-ids "$INSTANCE_ID" \
                --query "Reservations[0].Instances[0].IamInstanceProfile.Arn" \
                --output text | awk -F/ '{print $NF}')
            fi
          fi
          if [ -z "$PROFILE" ] || [ "$PROFILE" = "None" ]; then
            echo "Could not resolve IamInstanceProfile from ${{ inputs.template_env }}." >&2
            jq '[.ConfigurationSettings[0].OptionSettings[] | select(.OptionName | test("Profile|Role"; "i"))]' \
              /tmp/config.json >&2 || true
            exit 1
          fi

          echo "Using IamInstanceProfile: $PROFILE"
          jq --arg profile "$PROFILE" \
            '. + [{Namespace: "aws:autoscaling:launchconfiguration", OptionName: "IamInstanceProfile", Value: $profile}]' \
            /tmp/option-settings.json > /tmp/option-settings-with-iam.json
          mv /tmp/option-settings-with-iam.json /tmp/option-settings.json

          if [ "${{ inputs.tier_type }}" = "standard" ]; then
            echo "tier=Name=WebServer,Type=Standard" >> "$GITHUB_ENV"
            jq '. + [{Namespace: "aws:elasticbeanstalk:environment", OptionName: "EnvironmentType", Value: "SingleInstance"}]' \
              /tmp/option-settings.json > /tmp/tier.json
            mv /tmp/tier.json /tmp/option-settings.json
            echo "Tier: single instance (no load balancer)"
          else
            echo "tier=Name=WebServer,Type=LoadBalanced" >> "$GITHUB_ENV"
            echo "Tier: load balanced (ALB)"
          fi

          COUNT=$(jq length /tmp/option-settings.json)
          echo "Cloned $COUNT option settings from ${{ inputs.template_env }}"

      - name: Create environment
        if: steps.exists.outputs.exists != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          PREFIX="${{ inputs.new_env_name }}"
          # CNAME prefix max 63 chars; must be unique per region/account.
          aws elasticbeanstalk create-environment \
            --region "${AWS_REGION}" \
            --application-name "${EB_APPLICATION}" \
            --environment-name "${{ inputs.new_env_name }}" \
            --solution-stack-name "${{ steps.platform.outputs.stack }}" \
            --tier "${tier}" \
            --cname-prefix "${PREFIX}" \
            --option-settings file:///tmp/option-settings.json

      - name: Wait until Ready
        if: steps.exists.outputs.exists != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          echo "Waiting for ${{ inputs.new_env_name }} to become Ready (up to ~25 min)…"
          for i in $(seq 1 75); do
            read -r STATUS HEALTH CNAME STACK <<< "$(aws elasticbeanstalk describe-environments \
              --region "${AWS_REGION}" \
              --environment-names "${{ inputs.new_env_name }}" \
              --query "Environments[0].[Status,Health,SolutionStackName,CNAME]" \
              --output text)"
            echo "[$i] Status=$STATUS Health=$HEALTH"
            if [ "$STATUS" = "Ready" ]; then
              echo "URL: http://${CNAME}/"
              echo "Platform: ${STACK}"
              exit 0
            fi
            if [ "$STATUS" = "Terminated" ]; then
              echo "Environment failed to launch (Terminated)." >&2
              aws elasticbeanstalk describe-events \
                --region "${AWS_REGION}" \
                --environment-name "${{ inputs.new_env_name }}" \
                --max-items 8 \
                --query "Events[*].Message" \
                --output text >&2 || true
              exit 1
            fi
            sleep 20
          done
          echo "Timed out waiting for Ready." >&2
          exit 1

      - name: Summary
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          echo "## Elastic Beanstalk: ${{ inputs.new_env_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.exists.outputs.exists }}" = "true" ]; then
            echo "Environment already exists — no changes made." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- **Template (env vars):** ${{ inputs.template_env }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Platform:** Node.js ${{ steps.platform.outputs.node_major }} (latest AL2023 stack)" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Stack:** \`${{ steps.platform.outputs.stack }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Tier:** ${{ inputs.tier_type }}" >> "$GITHUB_STEP_SUMMARY"
          fi
          aws elasticbeanstalk describe-environments \
            --region "${AWS_REGION}" \
            --environment-names "${{ inputs.new_env_name }}" \
            --query "Environments[0].[EnvironmentName,Status,Health,SolutionStackName,CNAME,VersionLabel]" \
            --output table >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Next: **Deploy to Elastic Beanstalk** → target \`${{ inputs.new_env_name }}\`." >> "$GITHUB_STEP_SUMMARY"
