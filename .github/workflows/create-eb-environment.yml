name: Create Elastic Beanstalk environment

# Clone option settings from an existing env (default: meter-reading-dev).
on:
  workflow_dispatch:
    inputs:
      new_env_name:
        description: "New environment name"
        required: true
        default: amr-portal-prod
      template_env:
        description: "Clone configuration from this environment"
        required: true
        default: meter-reading-dev
        type: choice
        options:
          - meter-reading-dev
          - meter-reading-prod

permissions:
  contents: read

env:
  AWS_REGION: us-west-2
  EB_APPLICATION: meter-reading-app

jobs:
  create:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check if environment already exists
        id: exists
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          read -r NAME STATUS <<< "$(aws elasticbeanstalk describe-environments \
            --region "${AWS_REGION}" \
            --environment-names "${{ inputs.new_env_name }}" \
            --query "Environments[0].[EnvironmentName,Status]" \
            --output text 2>/dev/null || echo "None None")"
          if [ "$NAME" = "${{ inputs.new_env_name }}" ] && [ "$STATUS" != "Terminated" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            aws elasticbeanstalk describe-environments \
              --region "${AWS_REGION}" \
              --environment-names "${{ inputs.new_env_name }}" \
              --query "Environments[0].[Status,Health,CNAME]" \
              --output table
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            if [ "$STATUS" = "Terminated" ]; then
              echo "Previous env was Terminated — creating a new one with the same name."
            fi
          fi

      - name: Resolve platform from template
        if: steps.exists.outputs.exists != 'true'
        id: platform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          STACK=$(aws elasticbeanstalk describe-environments \
            --region "${AWS_REGION}" \
            --environment-names "${{ inputs.template_env }}" \
            --query "Environments[0].SolutionStackName" \
            --output text)
          if [ -z "$STACK" ] || [ "$STACK" = "None" ]; then
            echo "Template env not found: ${{ inputs.template_env }}" >&2
            exit 1
          fi
          echo "stack=$STACK" >> "$GITHUB_OUTPUT"
          echo "Using platform: $STACK"

      - name: Build option settings from template
        if: steps.exists.outputs.exists != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          aws elasticbeanstalk describe-configuration-settings \
            --region "${AWS_REGION}" \
            --application-name "${EB_APPLICATION}" \
            --environment-name "${{ inputs.template_env }}" \
            --output json > /tmp/config.json

          # Only clone app env vars + IAM instance profile (avoid VPC/SG conflicts from dev).
          jq '
            .ConfigurationSettings[0].OptionSettings
            | map(select(
                .ResourceName == null
                and (
                  .Namespace == "aws:elasticbeanstalk:application:environment"
                  or (.Namespace == "aws:autoscaling:launchconfiguration" and .OptionName == "IamInstanceProfile")
                )
                and (.Value != null)
                and (.Value | type == "string")
              ))
            | map({Namespace, OptionName, Value})
          ' /tmp/config.json > /tmp/option-settings.json

          COUNT=$(jq length /tmp/option-settings.json)
          echo "Cloned $COUNT option settings from ${{ inputs.template_env }}"

      - name: Create environment
        if: steps.exists.outputs.exists != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          PREFIX="${{ inputs.new_env_name }}"
          # CNAME prefix max 63 chars; must be unique per region/account.
          aws elasticbeanstalk create-environment \
            --region "${AWS_REGION}" \
            --application-name "${EB_APPLICATION}" \
            --environment-name "${{ inputs.new_env_name }}" \
            --solution-stack-name "${{ steps.platform.outputs.stack }}" \
            --cname-prefix "${PREFIX}" \
            --option-settings file:///tmp/option-settings.json

      - name: Wait until Ready
        if: steps.exists.outputs.exists != 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          echo "Waiting for ${{ inputs.new_env_name }} to become Ready (up to ~20 min)…"
          for i in $(seq 1 60); do
            read -r STATUS HEALTH CNAME <<< "$(aws elasticbeanstalk describe-environments \
              --region "${AWS_REGION}" \
              --environment-names "${{ inputs.new_env_name }}" \
              --query "Environments[0].[Status,Health,CNAME]" \
              --output text)"
            echo "[$i] Status=$STATUS Health=$HEALTH"
            if [ "$STATUS" = "Ready" ]; then
              echo "URL: http://${CNAME}/"
              echo "cname=$CNAME" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ "$STATUS" = "Terminated" ]; then
              echo "Environment failed to launch (Terminated)." >&2
              aws elasticbeanstalk describe-events \
                --region "${AWS_REGION}" \
                --environment-name "${{ inputs.new_env_name }}" \
                --max-items 8 \
                --query "Events[*].Message" \
                --output text >&2 || true
              exit 1
            fi
            sleep 20
          done
          echo "Timed out waiting for Ready." >&2
          exit 1

      - name: Summary
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          echo "## Elastic Beanstalk: ${{ inputs.new_env_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.exists.outputs.exists }}" = "true" ]; then
            echo "Environment already exists — no changes made." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- **Template:** ${{ inputs.template_env }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Application:** ${EB_APPLICATION}" >> "$GITHUB_STEP_SUMMARY"
          fi
          aws elasticbeanstalk describe-environments \
            --region "${AWS_REGION}" \
            --environment-names "${{ inputs.new_env_name }}" \
            --query "Environments[0].[EnvironmentName,Status,Health,CNAME,VersionLabel]" \
            --output table >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Next: run **Deploy to Elastic Beanstalk** with target \`${{ inputs.new_env_name }}\`." >> "$GITHUB_STEP_SUMMARY"
