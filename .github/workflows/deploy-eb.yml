name: Deploy to Elastic Beanstalk

# Manual deploy only — push to main/reetika does not deploy.
on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Elastic Beanstalk environment to deploy to"
        required: true
        default: amrportal
        type: choice
        options:
          - amrportal-prod-0519
          - amrportal-prod
          - meter-reading-dev
          - amrportal
          - amr-portal-prod
          - meter-reading-prod

permissions:
  contents: read

concurrency:
  # Don't run two deploys to the same EB env in parallel.
  group: eb-deploy-${{ github.ref_name }}
  cancel-in-progress: false

env:
  AWS_REGION: us-west-2
  EB_APPLICATION: meter-reading-app
  NODE_VERSION: "20"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Resolve target environment
        id: target
        run: |
          ENV="${{ github.event.inputs.target_env }}"
          echo "env_name=$ENV" >> "$GITHUB_OUTPUT"
          echo "Deploying to $ENV"

      - name: Create deploy bundle
        run: |
          # Mirror .ebignore: exclude node_modules, git, env files, IDE/OS junk,
          # and the workflow folder itself (not needed at runtime).
          zip -r deploy.zip . \
            -x "node_modules/*" \
            -x ".git/*" \
            -x ".github/*" \
            -x ".elasticbeanstalk/*" \
            -x ".env" \
            -x ".env.*" \
            -x "src/.env" \
            -x "*.log" \
            -x ".DS_Store" \
            -x "coverage/*" \
            -x ".vscode/*" \
            -x ".idea/*" \
            -x "deploy.zip"
          ls -lh deploy.zip

      - name: Set version label
        id: version
        run: echo "label=${{ github.sha }}-${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Upload version and start deployment
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: ${{ env.AWS_REGION }}
          application_name: ${{ env.EB_APPLICATION }}
          environment_name: ${{ steps.target.outputs.env_name }}
          version_label: ${{ steps.version.outputs.label }}
          version_description: "${{ github.event.inputs.target_env }} (${{ github.actor }})"
          deployment_package: deploy.zip
          # Deprecated EB platforms often stay at Info/Grey — never Green — and the
          # action would fail after wait_for_environment_recovery. We verify Ready below.
          wait_for_deployment: false

      - name: Wait for Ready (accept Info/Grey health)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          chmod +x scripts/eb-wait-ready.sh
          scripts/eb-wait-ready.sh \
            "${{ steps.target.outputs.env_name }}" \
            "${{ steps.version.outputs.label }}" \
            "${{ env.AWS_REGION }}" \
            20

      - name: Sync Roboflow environment variables
        if: steps.target.outputs.env_name == 'amrportal' || steps.target.outputs.env_name == 'amrportal-prod' || steps.target.outputs.env_name == 'amrportal-prod-0519'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ROBOFLOW_API_KEY: ${{ secrets.ROBOFLOW_API_KEY }}
          ROBOFLOW_WORKSPACE: ${{ secrets.ROBOFLOW_WORKSPACE }}
        run: |
          if [ -z "${ROBOFLOW_API_KEY:-}" ]; then
            echo "ROBOFLOW_API_KEY secret not set — skip."
            exit 0
          fi
          WORKSPACE="${ROBOFLOW_WORKSPACE:-analoggasmeter}"
          aws elasticbeanstalk update-environment \
            --region "${AWS_REGION}" \
            --environment-name "${{ steps.target.outputs.env_name }}" \
            --option-settings \
              "Namespace=aws:elasticbeanstalk:application:environment,OptionName=ROBOFLOW_API_KEY,Value=${ROBOFLOW_API_KEY}" \
              "Namespace=aws:elasticbeanstalk:application:environment,OptionName=ROBOFLOW_WORKSPACE,Value=${WORKSPACE}"
          aws elasticbeanstalk wait environment-updated \
            --region "${AWS_REGION}" \
            --environment-names "${{ steps.target.outputs.env_name }}"

      - name: Summary
        run: |
          echo "## Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Environment:** ${{ steps.target.outputs.env_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version label:** ${{ steps.version.outputs.label }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Triggered by:** ${{ github.actor }} (${{ github.event_name }})" >> "$GITHUB_STEP_SUMMARY"
